<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RH System</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text y='.9em' font-size='70' x='15' fill='white'>RH</text></svg>">
  <link rel="stylesheet" href="assets/css/style.css?v=2">
  <!-- Chart.js for payroll evolution chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ─── Toast container ─────────────────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ─── Modal overlay ──────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modal-title">Título</h2>
      <button class="modal-close" onclick="closeModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ─── Login Page ──────────────────────────────────────────────────────── -->
<div id="login-page">
  <div class="login-card">
    <h1>RH System</h1>
    <p class="subtitle">Sistema de Gestão de Recursos Humanos</p>

    <div class="tab-group">
      <button class="tab-btn active" id="tab-login" onclick="switchLoginTab('login')">Entrar</button>
      <button class="tab-btn" id="tab-register" onclick="switchLoginTab('register')">Cadastrar</button>
    </div>

    <!-- Entrar -->
    <div id="form-login">
      <div id="login-error"></div>
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" class="form-control" id="login-username" placeholder="Digite seu usuário"
               onkeydown="if(event.key==='Enter') document.getElementById('login-password').focus()">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" class="form-control" id="login-password" placeholder="••••"
               onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn btn-primary btn-lg" onclick="doLogin()" id="btn-login">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Entrar
      </button>
    </div>

    <!-- Cadastrar (primeiro admin / setup) -->
    <div id="form-register" class="hidden">
      <div id="register-error"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" class="form-control" id="reg-name" placeholder="Seu nome">
        </div>
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" class="form-control" id="reg-username" placeholder="ex: LucasMello">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Senha</label>
          <input type="password" class="form-control" id="reg-password" placeholder="••••">
        </div>
        <div class="form-group">
          <label>Confirmar Senha</label>
          <input type="password" class="form-control" id="reg-confirm" placeholder="••••">
        </div>
      </div>
      <div class="form-group">
        <label>Razão Social da Empresa</label>
        <input type="text" class="form-control" id="reg-company" placeholder="Empresa Ltda.">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>CNPJ</label>
          <input type="text" class="form-control" id="reg-cnpj" placeholder="00.000.000/0000-00">
        </div>
        <div class="form-group">
          <label>Email da Empresa (opcional)</label>
          <input type="text" class="form-control" id="reg-company-email" placeholder="empresa@email.com">
        </div>
      </div>
      <button class="btn btn-primary btn-lg" onclick="doRegister()" id="btn-register">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Criar Conta
      </button>
    </div>
  </div>
</div>

<!-- ─── App Layout ──────────────────────────────────────────────────────── -->
<div id="app" class="hidden">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">RH System</span>
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Recolher menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-item" data-page="employees" onclick="navigate('employees')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="nav-label">Funcionários</span>
      </button>
      <button class="nav-item" data-page="seamstresses" onclick="navigate('seamstresses')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/><line x1="5.6" y1="5.6" x2="9.2" y2="9.2"/><line x1="14.8" y1="14.8" x2="18.4" y2="18.4"/><line x1="5.6" y1="18.4" x2="9.2" y2="14.8"/><line x1="14.8" y1="9.2" x2="18.4" y2="5.6"/></svg>
        <span class="nav-label">Costureiras</span>
      </button>
      <button class="nav-item" data-page="payroll" onclick="navigate('payroll')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        <span class="nav-label">Folha de Pagamento</span>
      </button>
      <button class="nav-item" data-page="vales" onclick="navigate('vales')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span class="nav-label">Vales</span>
      </button>
      <button class="nav-item" data-page="rescisao" onclick="navigate('rescisao')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="17" y1="11" x2="23" y2="11"/></svg>
        <span class="nav-label">Rescisão</span>
      </button>
      <button class="nav-item" data-page="vacation" onclick="navigate('vacation')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="nav-label">Férias</span>
      </button>
      <button class="nav-item" data-page="timesheet" onclick="navigate('timesheet')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="nav-label">Ponto</span>
      </button>
      <button class="nav-item" data-page="bankhours" onclick="navigate('bankhours')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
        <span class="nav-label">Banco de Horas</span>
      </button>
      <button class="nav-item" data-page="reports" onclick="navigate('reports')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="nav-label">Relatórios</span>
      </button>
      <button class="nav-item" data-page="settings" onclick="navigate('settings')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span class="nav-label">Configurações</span>
      </button>
      <button class="nav-item" data-page="audit" onclick="navigate('audit')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span class="nav-label">Auditoria</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="nav-item" onclick="doLogout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="nav-label">Sair</span>
      </button>
    </div>
  </aside>

  <!-- Main content area -->
  <main id="main-content">
    <div id="page-content" class="page-wrapper">
      <!-- Rendered by JS router -->
    </div>
  </main>

</div>

<script src="assets/js/api.js?v=19"></script>

</body>
</html>
